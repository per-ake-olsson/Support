name: Generate PDFs for Markdown

on:
  push:
    branches:
      - main
    paths:
      # Watch Swedish documentation markdown files
      - 'Key2Pass/Win/Swe/downloads/**/*.md'
      # Watch English documentation markdown files
      - 'Key2Pass/Win/Eng/downloads/**/*.md'
  workflow_dispatch:

jobs:
  md_to_pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pandoc and LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-latex-base texlive-fonts-recommended texlive-latex-extra

      - name: Generate PDFs
        id: generate
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Collect all .md files in both language folders for manual runs
            mapfile -t files < <(find Key2Pass/Win/Swe/downloads Key2Pass/Win/Eng/downloads -maxdepth 1 -name '*.md' -print)
          else
            # Collect only the changed .md files in both language folders on push events
            mapfile -t files < <(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- 'Key2Pass/Win/Swe/downloads/*.md' 'Key2Pass/Win/Eng/downloads/*.md')
          fi

          if [ ${#files[@]} -eq 0 ]; then
            echo "No Markdown files to convert."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          for file in "${files[@]}"; do
            echo "Converting ${file}"
            pandoc "${file}" -o "${file%.md}.pdf" -V geometry:top=20mm -V geometry:left=15mm -V geometry:right=15mm -V geometry:bottom=20mm
          done

          # Check if any PDF files have been added or changed
          if git status --porcelain | grep -q '.pdf$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit generated PDFs
        if: steps.generate.outputs.changed == 'true'
        uses: EndBug/add-and-commit@v9
        with:
          # Add both Swedish and English PDF outputs to the commit
          add: |
            Key2Pass/Win/Swe/downloads/*.pdf
            Key2Pass/Win/Eng/downloads/*.pdf
          message: 'chore: auto-generate PDF for updated manuals'
          default_author: github_actions
